name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release tarball
        id: build
        run: |
          APP_ID="neura_google_calendar_sync"
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="nextcloud_google_calendar_sync-${VERSION}.tar.gz"
          mkdir -p /tmp/build/${APP_ID}
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='RELEASE.md' \
            --exclude='deploy.sh' \
            --exclude='composer.phar' \
            . /tmp/build/${APP_ID}/
          tar -czf "/tmp/${ARCHIVE}" -C /tmp/build "${APP_ID}"
          echo "archive=/tmp/${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Sign the archive
        id: sign
        env:
          NC_PRIVATE_KEY: ${{ secrets.NC_PRIVATE_KEY }}
        run: |
          if [ -z "$NC_PRIVATE_KEY" ]; then
            echo "NC_PRIVATE_KEY not configured, skipping"
            echo "signature=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$NC_PRIVATE_KEY" > /tmp/nc_app.key
          chmod 600 /tmp/nc_app.key
          SIGNATURE=$(openssl dgst -sha512 -sign /tmp/nc_app.key "${{ steps.build.outputs.archive }}" | openssl base64 | tr -d '\n')
          rm /tmp/nc_app.key
          echo "signature=${SIGNATURE}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## ${VERSION}/,/^## [0-9]/" CHANGELOG.md | grep -v "^## " || true)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ${{ steps.build.outputs.archive }}
          body: ${{ steps.changelog.outputs.notes }}
